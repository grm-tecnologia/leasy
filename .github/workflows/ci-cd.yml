name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.4.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ─── Deploy to Hetzner ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            set -e

            APP_DIR="/opt/leasy"

            # Instalar dependências se necessário
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi

            if ! docker compose version &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq docker-compose-plugin
            fi

            if ! command -v nginx &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq nginx
              systemctl enable nginx
            fi

            # Clonar ou atualizar
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
              git fetch origin
              git reset --hard origin/main
            else
              git clone https://github.com/pinochet97/leasy.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Build e deploy
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose build --no-cache
            docker compose up -d

            # Configurar Nginx
            cp "$APP_DIR/docker/nginx.conf" /etc/nginx/sites-available/leasy
            ln -sf /etc/nginx/sites-available/leasy /etc/nginx/sites-enabled/leasy
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            # Verificar saúde
            sleep 8
            curl -sf http://localhost:3000/ > /dev/null && echo "✅ Deploy OK" || echo "⚠️ App may still be starting"
