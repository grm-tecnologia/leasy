version: "3.9"

# Development override — only starts MySQL and Redis.
# The app itself runs locally with `pnpm dev` for hot-reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   pnpm dev

services:
  mysql:
    image: mysql:8.0
    container_name: leasy-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: leasy
      MYSQL_USER: leasy
      MYSQL_PASSWORD: leasy_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: leasy-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-dev-data:
    driver: local
  redis-dev-data:
    driver: local
